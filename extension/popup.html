<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grabber</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="title">grabber</div>

    <div class="field">
      <label for="urls">URLs (one per line)</label>
      <textarea id="urls" rows="4" autocomplete="off" spellcheck="false"></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label for="quality">Format</label>
        <select id="quality">
          <option value="best">Best</option>
          <option value="1080p">1080p MP4</option>
          <option value="720p">720p MP4</option>
          <option value="480p">480p MP4</option>
          <option value="audio">Audio (MP3)</option>
        </select>
      </div>
      <div class="field">
        <label for="tool">Tool</label>
        <select id="tool">
          <option value="auto">Auto</option>
          <option value="yt-dlp">yt-dlp</option>
          <option value="gallery-dl">gallery-dl</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button id="grab">Grab here</button>
      <button
        id="open-tab"
        class="secondary"
        type="button"
        title="Open in full Grabber UI tab"
      >
        ↗
      </button>
    </div>

    <div id="progress-wrap" class="progress-wrap" hidden>
      <div class="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-filename" class="filename"></span>
        <span id="progress-stats" class="stats"></span>
      </div>
      <button id="cancel" class="secondary cancel-btn" type="button">
        Cancel
      </button>
    </div>

    <div class="footer">
      <span id="status" class="muted"></span>
      <a id="settings" href="#">Settings</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
