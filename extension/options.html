<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grabber settings</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        width: auto;
        max-width: 480px;
        margin: 24px auto;
      }
      .hint {
        color: var(--muted);
        font-size: 11px;
        margin-top: 4px;
      }
      .saved {
        color: var(--success);
        font-size: 12px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="title">grabber settings</div>

    <div class="field">
      <label for="server">Server URL</label>
      <input
        id="server"
        type="url"
        placeholder="http://localhost:3001"
      />
      <div class="hint">
        Examples: <code>http://localhost:3001</code> on the same machine,
        <code>http://192.168.x.x:3001</code> on the LAN, or your Tailscale name
        like <code>http://admin.tail60bd41.ts.net:3001</code>.
      </div>
    </div>

    <button id="save">Save</button>
    <div id="saved" class="saved" hidden>Saved</div>

    <script src="options.js"></script>
  </body>
</html>
